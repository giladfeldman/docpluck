name: Bump docpluckapp library pin on new tag

# Triggered when a vX.Y.Z tag is pushed to this (docpluck library) repo.
# Commits the bumped `service/requirements.txt` docpluck git pin DIRECTLY
# to the giladfeldman/docpluckapp `master` branch — no PR.
#
# Why no PR (decided 2026-05-15): the only pre-merge check a PR ran was
# Vercel, which builds the Next.js frontend and is orthogonal to a
# Python-service `requirements.txt` change — it never gated the pin.
# The real gate, `verify-railway-deploy.yml`, triggers on push to master
# and runs identically whether the bump lands via PR or direct commit.
# `master` has no branch protection, so a direct push is permitted.
#
# Required secret:
#   APP_REPO_TOKEN — GitHub Personal Access Token with `repo` scope on
#                    giladfeldman/docpluckapp. Add via:
#                      gh secret set APP_REPO_TOKEN
#                        --repo giladfeldman/docpluck
#                        --body "$YOUR_PAT"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-pin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Checkout docpluckapp
        uses: actions/checkout@v4
        with:
          repository: giladfeldman/docpluckapp
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app

      - name: Bump pin in service/requirements.txt
        working-directory: app
        run: |
          set -e
          REQ=service/requirements.txt
          NEW_TAG="${{ steps.tag.outputs.tag }}"
          PIN="docpluck[all] @ git+https://github.com/giladfeldman/docpluck.git@${NEW_TAG}"
          # Idempotent: only commit if the file actually changes.
          python -c "
          import re, sys
          path = '$REQ'
          s = open(path).read()
          new = re.sub(r'docpluck\[all\] @ git\+https://github\.com/giladfeldman/docpluck\.git@v?[0-9]+\.[0-9]+\.[0-9]+', '$PIN', s)
          if new == s:
              print('no change'); sys.exit(0)
          open(path, 'w').write(new)
          print('bumped')
          "

      - name: Commit pin bump directly to master
        working-directory: app
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          if git diff --quiet; then
            echo "service/requirements.txt already pinned to ${NEW_TAG} — nothing to do."
            exit 0
          fi
          git config user.name "docpluck-bot"
          git config user.email "noreply@anthropic.com"
          git add service/requirements.txt
          git commit -m "pin: auto-bump docpluck library to ${NEW_TAG}

          Triggered by tag push on giladfeldman/docpluck. Committed directly
          to master — verify-railway-deploy.yml (triggers on push to master)
          asserts the live Railway service reports ${NEW_TAG} after redeploy.

          Co-Authored-By: docpluck-bot <noreply@anthropic.com>"
          git push origin HEAD:master
